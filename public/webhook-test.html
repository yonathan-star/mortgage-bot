<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mortgage Bot — Webhook Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px 24px; }
    h1 { font-size: 28px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; }
    p  { color: #64748b; margin-bottom: 32px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 28px; max-width: 600px; margin: 0 auto; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; margin-top: 18px; }
    input, select { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; }
    button { margin-top: 24px; width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #result { margin-top: 20px; padding: 16px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 60px; color: #4ade80; display: none; }
    #result.error { color: #f87171; }
    h1, p { text-align: center; }
  </style>
</head>
<body>
  <h1>Arive Webhook Tester</h1>
  <p>Send a test payload to <code>/api/arive-webhook</code></p>
  <div class="card">
    <label>Loan ID</label>
    <input id="loanId" value="TEST-001" />

    <label>Borrower Name</label>
    <input id="borrowerName" value="John Smith" />

    <label>LO Name</label>
    <input id="loName" value="Jane Doe" />

    <label>Status</label>
    <select id="status">
      <option>LOAN_SETUP</option>
      <option>DISCLOSURE_SENT</option>
      <option>UNDERWRITING_SUBMITTED</option>
      <option>APPROVED_WITH_CONDITIONS</option>
      <option>RE_SUBMITTAL</option>
      <option>CLEAR_TO_CLOSE</option>
      <option>DOCS_OUT</option>
      <option>DOCS_SIGNED</option>
      <option>SUSPENDED</option>
      <option>LOAN_FUNDED</option>
      <option>BROKER_CHECK_RECEIVED</option>
      <option>COMMISSION_PAID</option>
      <option>ADVERSE</option>
    </select>

    <label>Zapier Header Key</label>
    <input id="headerKey" placeholder="same as ZAPIER_STATIC_HEADER_KEY in .env" />

    <button onclick="sendTest()">Send Test Payload</button>
    <div id="result"></div>
  </div>

  <script>
    async function sendTest() {
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.className = '';
      result.textContent = 'Sending...';

      const payload = {
        loan_id:       document.getElementById('loanId').value,
        borrower_name: document.getElementById('borrowerName').value,
        lo_name:       document.getElementById('loName').value,
        status:        document.getElementById('status').value
      };

      try {
        const res = await fetch('/api/arive-webhook', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-zapier-key': document.getElementById('headerKey').value
          },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        result.className = res.ok ? '' : 'error';
        result.textContent = `HTTP ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
      } catch (err) {
        result.className = 'error';
        result.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
